<style>
:root{--primary:#059669;--primary-light:#d1fae5;--primary-dark:#047857;--danger:#dc2626;--warn:#d97706;--gray:#6b7280;--border:#e5e7eb;--bg:#f9fafb;--card-shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;max-width:1200px;margin:0 auto;padding:0 16px 60px;color:#222;background:#fff}
a{color:var(--primary);text-decoration:none}
.topbar{padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.topbar a{font-size:13px;font-weight:600;color:#2563eb}
h1{font-size:20px;border-bottom:2px solid #333;padding-bottom:8px;margin-bottom:4px}
.subtitle{font-size:12px;color:var(--gray);margin-bottom:20px}
.input-section{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.input-section label{font-size:13px;font-weight:600;white-space:nowrap;min-width:130px}
.input-section input{flex:1;min-width:280px;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px}

.upload-zone input{display:none}
.file-list{list-style:none;margin-bottom:16px}
.file-list li{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:4px 0;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:13px}

.info-bar{display:flex;gap:16px;flex-wrap:wrap;padding:14px 18px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;margin-bottom:20px;display:none}

.doc-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.doc-card{border:1px solid var(--border);border-radius:10px;padding:16px;background:#fff;box-shadow:var(--card-shadow);display:flex;align-items:flex-start;gap:12px}
.doc-card .icon{font-size:28px;flex-shrink:0;line-height:1}

.section{border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;background:#fff;box-shadow:var(--card-shadow)}
.section h3{font-size:15px;color:var(--primary-dark);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section h3 .badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}

.badge-na{background:#e5e7eb;color:#374151}
.row{display:flex;gap:8px;margin:6px 0;font-size:13px;align-items:baseline}
.row .lbl{color:var(--gray);min-width:140px;flex-shrink:0;font-weight:600}
.row .val{color:#111}
.checklist{list-style:none}

<body>

<div class="topbar"><a href="../index.html">&larr; 대시보드로 돌아가기</a></div>

<h1>청년일자리도약장려금 서류 판독 도구 <span style="font-size:13px;color:#888">V1</span></h1>
<p class="subtitle">요청 대상자 이름과 PDF 서류를 업로드하면, 6종 서류 존재 여부 · 정규직 판단 · 최저임금 준수 · 학력확인 · 동의서 완비 등을 자동 판독합니다.</p>

<!-- Inputs -->
<div class="input-section">
  <label>Anthropic API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-...">
  <span class="status" id="apiKeyStatus"></span>
</div>
<div class="input-section">
  <label>요청 대상자 이름:</label>
  <input type="text" id="targetName" placeholder="예: 황인경">
</div>

<!-- Upload -->
<div class="upload-zone" id="uploadZone">
  <h3>PDF 파일을 드래그하거나 클릭하여 업로드</h3>
  <p>졸업증명서 · 근로계약서 · 사업자등록증명 · 학력확인서 · 동의서 등 (복수 파일 가능, 한 PDF에 여러 서류 포함 가능)</p>
  <input type="file" id="fileInput" accept="application/pdf" multiple>
</div>
<ul class="file-list" id="fileList"></ul>

<div class="btn-row"><button class="btn-primary" id="btnAnalyze" disabled>분석 실행</button></div>
<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<div id="statusText"></div>

<!-- Results -->
<div id="results" style="display:none">
  <div class="summary-banner" id="summaryBanner"></div>
  <div class="info-bar" id="infoBar"></div>
  <h2 style="font-size:16px;margin:20px 0 12px">서류 존재 여부</h2>
  <div class="doc-cards" id="docCards"></div>
  <div id="analysisArea"></div>
</div>

<details style="margin-top:24px"><summary>API 응답 원문 (디버그)</summary><pre class="log" id="debugLog">분석 실행 후 표시됩니다.</pre></details>

<script>
let uploadedFiles=[];
const $=id=>document.getElementById(id);

// API Key persistence
(function(){
  const s=localStorage.getItem('ANTHROPIC_API_KEY');
  if(s)$('apiKey').value=s;
  $('apiKey').addEventListener('input',()=>{
    const k=$('apiKey').value.trim();
    localStorage.setItem('ANTHROPIC_API_KEY',k);
    $('apiKeyStatus').textContent=k?'Key 저장됨':'';
    updateBtn();
  });
  if(s)$('apiKeyStatus').textContent='Key 저장됨';
})();

// File upload
const zone=$('uploadZone'),fi=$('fileInput');
zone.addEventListener('click',()=>fi.click());
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover')});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');addFiles(e.dataTransfer.files)});
fi.addEventListener('change',()=>addFiles(fi.files));
$('targetName').addEventListener('input',updateBtn);

function addFiles(files){
  for(const f of files){
    if(f.type!=='application/pdf'){alert(f.name+': PDF만 가능');continue}
    if(uploadedFiles.some(u=>u.name===f.name&&u.size===f.size))continue;
    uploadedFiles.push({file:f,name:f.name,size:f.size});
  }
  renderFileList();updateBtn();
}
function renderFileList(){
  const ul=$('fileList');ul.innerHTML='';
  uploadedFiles.forEach((f,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="fname">${esc(f.name)}</span><span class="fsize">${(f.size/1024).toFixed(0)} KB</span><button class="remove" data-i="${i}">삭제</button>`;
    ul.appendChild(li);
  });
  ul.querySelectorAll('.remove').forEach(b=>b.addEventListener('click',e=>{
    uploadedFiles.splice(+e.target.dataset.i,1);renderFileList();updateBtn();
  }));
}
function updateBtn(){
  $('btnAnalyze').disabled=!(uploadedFiles.length>0&&$('apiKey').value.trim()&&$('targetName').value.trim());
}
updateBtn();

async function pdfToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);
  });
}

async function callClaude(apiKey,contents){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,temperature:0,messages:[{role:'user',content:contents}]})
  });
  const j=await r.json();
  if(!r.ok)throw new Error(JSON.stringify(j).slice(0,500));
  return j.content[0].text;
}

// Main
$('btnAnalyze').addEventListener('click',runAnalysis);

async function runAnalysis(){
  const apiKey=$('apiKey').value.trim();
  const targetName=$('targetName').value.trim();
  if(!apiKey){alert('API Key를 입력하세요.');return}
  if(!targetName){alert('요청 대상자 이름을 입력하세요.');return}
  if(!uploadedFiles.length){alert('PDF를 업로드하세요.');return}

  $('btnAnalyze').disabled=true;
  $('progressBar').style.display='block';
  $('results').style.display='none';
  setProgress(5,'PDF 변환 중...');

  try{
    const pdfContents=[];
    for(let i=0;i<uploadedFiles.length;i++){
      setProgress(5+Math.round(20*i/uploadedFiles.length),`PDF 변환 중 (${i+1}/${uploadedFiles.length})...`);
      pdfContents.push({name:uploadedFiles[i].name,base64:await pdfToBase64(uploadedFiles[i].file)});
    }

    setProgress(30,'Claude AI 분석 중... (1~2분 소요)');

    const content=[];
    pdfContents.forEach(p=>{
      content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:p.base64}});
      content.push({type:'text',text:`[위 PDF 파일명: ${p.name}]`});
    });
    content.push({type:'text',text:buildPrompt(targetName)});

    const raw=await callClaude(apiKey,content);
    $('debugLog').textContent=raw;
    setProgress(90,'결과 파싱 중...');

    let result;
    try{
      const m=raw.match(/```json\s*([\s\S]*?)\s*```/)||raw.match(/(\{[\s\S]*\})/);
      result=JSON.parse(m[1]);
    }catch(e){throw new Error('AI 응답 파싱 실패: '+e.message+'\n\n원문:\n'+raw.slice(0,500))}

    // 후처리: 정규직 판단 모순 보정
    postProcessResult(result);

    setProgress(100,'완료');
    renderResults(result,targetName);
    $('results').style.display='block';
  }catch(e){
    alert('분석 오류: '+e.message);
    console.error(e);
    $('debugLog').textContent=e.message;
  }finally{
    $('btnAnalyze').disabled=false;
    setTimeout(()=>{$('progressBar').style.display='none';$('statusText').textContent=''},2000);
  }
}

function setProgress(p,m){$('progressFill').style.width=p+'%';$('statusText').textContent=m||''}

// 후처리: AI가 evidence와 result를 모순되게 반환하는 경우 보정
function postProcessResult(r){
  if(!r.contract_analysis?.employment_type) return;
  const et=r.contract_analysis.employment_type;
  const ev=(et.evidence||'').toLowerCase();
  const cp=(et.contract_period||'');

  // 1. 계약기간에 종료일 패턴이 있으면 무조건 기간제
  const hasEndDate=/\d{4}.*년.*\d{1,2}.*월.*\d{1,2}.*일.*까지/.test(cp)||/까지/.test(cp);

  // 2. evidence에서 "기간제"라고 판단했는데 result가 정규직인 경우
  const evidenceSaysFixed=/기간제/.test(ev);

  if(et.result==='정규직'||et.result==='정규직_추정'){
    if(hasEndDate||evidenceSaysFixed){
      et.result='기간제';
      et.evidence=(et.evidence||'')+' [시스템 보정: 계약 종료일이 명시되어 있어 기간제로 재판정]';
    }
  }
}

// ========== Prompt ==========
function buildPrompt(targetName){
  return `당신은 한국 노동법 전문가이며, 청년일자리도약장려금 서류 검토 담당자입니다.
업로드된 PDF 서류들을 분석하여 아래 JSON 구조를 정확히 채워 반환하세요.

**요청 대상자 이름: "${targetName}"**

## 분석 요구사항

### A. 기본 정보 추출
- worker_name: 근로자 이름 (근로계약서 또는 기타 서류에서)
- start_date: 입사일/채용일 (YYYY-MM-DD)
- company_name: 사업장명
- birth_date: 생년월일 (YYYY-MM-DD, 있으면)

### B. 서류 존재 여부 (documents) — 6종 각각 found(true/false), detail(판단근거)
1. fact_certificate (사실증명서): 국세청 발급, "사실증명" 제목, 세무서장 직인
2. graduation_certificate (졸업증명서): 학교명, 졸업일자 포함
3. employment_contract (근로계약서): "근로계약서" 제목
4. business_registration (사업자등록증명): "사업자등록증명" 제목, 사업자등록번호 포함
5. education_confirmation (학력확인서): "최종 학력에 대한 자기 확인서" 제목
6. participation_consent (사업참여 동의서): "개인정보 수집·이용·제공" 관련 동의서

### C. 근로계약서 상세 분석 (contract_analysis) — 근로계약서가 없으면 null

#### C-1. employment_type (정규직 여부) ★★★ 최우선 판단 ★★★
청년일자리도약장려금은 정규직 채용이 필수 요건입니다.

**핵심 원칙: 계약 종료일이 존재하면 무조건 "기간제"입니다. 예외 없음.**

판단 규칙 (위에서 아래로 우선 적용):
1. 계약기간에 종료일(~년 ~월 ~일 까지)이 있다 → result: "기간제" (무조건)
2. "원칙적으로 N년", "연장 가능", "갱신 가능" 등 문구가 있어도 종료일이 명시되어 있으면 → result: "기간제"
3. 제목에 "기간제" 포함 → result: "기간제"
4. "기간의 정함이 없음", "정년까지" 등 → result: "정규직"
5. 계약기간 조항 자체가 없음 → result: "정규직_추정"
6. 위 어느 것에도 해당 안 됨 → result: "판단불가"

**절대 주의: result 값과 evidence 판단이 일치해야 합니다. evidence에서 "기간제"라고 분석했으면 result도 반드시 "기간제"로 설정하세요. 모순 금지.**

출력: result("정규직"/"기간제"/"정규직_추정"/"기간제_가능성"/"판단불가"), evidence(원문 인용), contract_period(있다면)

#### C-2. minimum_wage (최저임금 준수)
2025년 최저임금: 시급 10,030원 / 월환산(209시간) 2,096,270원
- monthly_salary, hourly_wage, weekly_hours, monthly_hours
- result: "준수"/"위반"/"확인불가"
- calculated_hourly, evidence

#### C-3. required_items (필수 기재사항 — 근로기준법 §17)
- is_part_time: 단시간 근로자 여부
- wage_components: 임금 구성항목·계산방법·지급방법
- working_hours: 소정근로시간
- holidays: 휴일
- annual_leave: 연차 유급휴가
- workplace_duties: 취업 장소·종사 업무
- daily_schedule: (단시간 근로자만) 근로일·근로일별 근로시간

각각 found(true/false), detail

### D. 사업자등록증명 검증 (business_reg_check) — 없으면 null
요청 대상자 이름("${targetName}")과 사업자등록증명에 기재된 대표자 성명을 비교합니다.
- target_name: 요청 대상자 이름
- doc_representative: 사업자등록증명에 기재된 대표자 성명
- match: 두 이름이 동일한지 (true/false). 동일하면 대표자 본인이므로 확인 필요
- detail: 판단 근거

### E. 학력확인서 검증 (edu_check) — 없으면 null

학력확인서의 체크표를 분석:
- highschool_checked: 고등학교 행에서 체크된 항목 (졸업/수료/중퇴/휴학/졸업예정/재학중/미체크)
- university_checked: 대학(원)교 행에서 체크된 항목
- has_problem: "휴학" 또는 "재학중"에 체크가 있으면 true → 확인 필요
- yes_no_checked: 5번 질문(재학중인 사실이 있습니까?) "예"/"아니오"/"미체크"/"판별불가"
- yes_no_problem: "예"에 체크 → true(확인필요), "아니오" → false(정상)
- result: "정상"/"확인필요"
- detail: 종합 판단 근거

### F. 동의서 검증 (consent_check) — 없으면 null

동의서 하단의 필수 기입 확인:
- checkboxes_ok: 동의 체크박스(수집이용/제공/고유식별정보) 모두 체크 여부 (true/false)
- checkboxes_detail: 각 항목 체크 상태 설명
- date_filled: 날짜 기입 여부 (true/false)
- date_detail: 기입된 날짜 또는 미기입
- signature_ok: 서명/날인 존재 여부 (true/false)
- signature_detail: 판단 근거
- result: "정상"/"확인필요"
- detail: 종합 판단 근거

// ========== Render ==========
function renderResults(r, targetName){
  // Info bar
  const ib=$('infoBar');
  ib.style.display='flex';
  ib.innerHTML='';
  addInfo(ib,'요청 대상자',targetName);
  if(r.worker_name)addInfo(ib,'근로자(서류)',r.worker_name);
  if(r.start_date)addInfo(ib,'입사일',r.start_date);
  if(r.company_name)addInfo(ib,'사업장',r.company_name);
  if(r.birth_date)addInfo(ib,'생년월일',r.birth_date);

  // Name match
  const nameOk=r.worker_name&&targetName&&r.worker_name.replace(/\s/g,'')===targetName.replace(/\s/g,'');
  if(r.worker_name&&!nameOk){
    addInfo(ib,'이름 일치','불일치!','var(--danger)');
  }

  // Doc cards
  renderDocCards(r.documents);

  // Analysis area
  const area=$('analysisArea');
  area.innerHTML='';

  // Contract analysis
  if(r.contract_analysis){
    const ca=r.contract_analysis;
    if(ca.employment_type) area.innerHTML+=renderEmploymentType(ca.employment_type);
    if(ca.minimum_wage) area.innerHTML+=renderMinWage(ca.minimum_wage);
    if(ca.required_items) area.innerHTML+=renderReqItems(ca.required_items);
  }

  // Business reg check
  if(r.business_reg_check) area.innerHTML+=renderBizCheck(r.business_reg_check);

  // Education check
  if(r.edu_check) area.innerHTML+=renderEduCheck(r.edu_check);

  // Consent check
  if(r.consent_check) area.innerHTML+=renderConsentCheck(r.consent_check);

  // Summary
  renderSummary(r,nameOk);
}

function addInfo(container,label,value,color){
  container.innerHTML+=`<div class="info-item"><div class="label">${label}</div><div class="value" ${color?`style="color:${color}"`:''}>${esc(value)}</div></div>`;
}

function renderDocCards(docs){
  const c=$('docCards');c.innerHTML='';
  const items=[
    ['fact_certificate','사실증명서','📄'],
    ['graduation_certificate','졸업증명서','🎓'],
    ['employment_contract','근로계약서','📝'],
    ['business_registration','사업자등록증명','🏢'],
    ['education_confirmation','학력확인서','📋'],
    ['participation_consent','사업참여 동의서','✍️']
  ];
  items.forEach(([key,label,icon])=>{
    const d=docs?.[key];if(!d)return;
    const cls=d.found?'found':'missing';
    const si=d.found?'✅':'❌';
    c.innerHTML+=`<div class="doc-card ${cls}"><div class="icon">${icon}</div><div class="content"><h4>${si} ${label} — ${d.found?'있음':'없음'}</h4><p>${esc(d.detail||'')}</p></div></div>`;
  });
}

function renderEmploymentType(et){
  const map={'정규직':['badge-ok','정규직 (적격)'],'기간제':['badge-fail','기간제 (부적격)'],'정규직_추정':['badge-warn','정규직 추정 (확인 필요)'],'기간제_가능성':['badge-warn','기간제 가능성 (확인 필요)'],'판단불가':['badge-na','판단불가']};
  const [badge,label]=map[et.result]||['badge-na',et.result];
  return `<div class="section">
    <h3>📋 정규직 여부 판단 <span class="badge ${badge}">${esc(label)}</span></h3>
    <div class="row"><span class="lbl">판정 결과</span><span class="val">${esc(label)}</span></div>
    ${et.contract_period?`<div class="row"><span class="lbl">계약기간</span><span class="val">${esc(et.contract_period)}</span></div>`:''}
    <div class="row"><span class="lbl">근거 문구</span><span class="val">${esc(et.evidence||'-')}</span></div>
    ${et.result!=='정규직'?'<div style="margin-top:8px;padding:10px;background:#fef2f2;border-radius:6px;font-size:12px;color:#991b1b;font-weight:600">⚠️ 청년일자리도약장려금은 정규직 채용이 필수 요건입니다. 기간제 계약인 경우 지원 부적격입니다.</div>':''}
  </div>`;
}

function renderMinWage(mw){
  const badge=mw.result==='준수'?'badge-ok':mw.result==='위반'?'badge-fail':'badge-na';
  return `<div class="section">
    <h3>💰 최저임금 준수 여부 <span class="badge ${badge}">${esc(mw.result)}</span></h3>
    ${mw.monthly_salary?`<div class="row"><span class="lbl">월급여 (계약서)</span><span class="val">${num(mw.monthly_salary)}원</span></div>`:''}
    ${mw.hourly_wage?`<div class="row"><span class="lbl">시급 (계약서)</span><span class="val">${num(mw.hourly_wage)}원</span></div>`:''}
    <div class="row"><span class="lbl">주 소정근로시간</span><span class="val">${mw.weekly_hours||'-'}시간</span></div>
    <div class="row"><span class="lbl">월 환산시간</span><span class="val">${mw.monthly_hours||'-'}시간</span></div>
    <div class="row"><span class="lbl">환산 시급</span><span class="val">${mw.calculated_hourly?num(Math.round(mw.calculated_hourly))+'원':'-'}</span></div>
    <div class="row"><span class="lbl">2025 최저시급</span><span class="val">10,030원 (월 2,096,270원/209h)</span></div>
    <div class="row"><span class="lbl">계산 근거</span><span class="val">${esc(mw.evidence||'-')}</span></div>
  </div>`;
}

function renderReqItems(ri){
  const items=[
    ['wage_components','임금 구성항목·계산방법·지급방법'],
    ['working_hours','소정근로시간'],
    ['holidays','휴일'],
    ['annual_leave','연차 유급휴가'],
    ['workplace_duties','취업 장소·종사 업무']
  ];
  if(ri.is_part_time)items.push(['daily_schedule','근로일·근로일별 근로시간 (단시간)']);
  const total=items.length,found=items.filter(([k])=>ri[k]?.found).length;
  const badge=found===total?'badge-ok':found>=total-1?'badge-warn':'badge-fail';
  let h=`<div class="section"><h3>📑 필수 기재사항 (근로기준법 §17) <span class="badge ${badge}">${found}/${total}</span></h3>`;
  if(ri.is_part_time)h+=`<div style="margin-bottom:10px;font-size:12px;color:var(--warn);font-weight:600">⚠️ 단시간 근로자 — 추가 필수항목 포함</div>`;
  h+=`<ul class="checklist">`;
  items.forEach(([k,label])=>{
    const d=ri[k],ok=d?.found;
    h+=`<li><span class="ci">${ok?'✅':'❌'}</span><span><strong>${label}</strong><br><span style="font-size:11px;color:var(--gray)">${esc(d?.detail||'-')}</span></span></li>`;
  });
  return h+`</ul></div>`;
}

function renderBizCheck(b){
  // match=true면 대표자와 대상자가 동일인 → 확인 필요
  const badge=b.match?'badge-warn':'badge-ok';
  const statusText=b.match?'동일인 — 확인 필요':'다른 사람 — 정상';
  return `<div class="section">
    <h3>🏢 사업자등록증명 검증 <span class="badge ${badge}">${statusText}</span></h3>
    <div class="row"><span class="lbl">요청 대상자</span><span class="val">${esc(b.target_name||'-')}</span></div>
    <div class="row"><span class="lbl">대표자 성명 (서류)</span><span class="val">${esc(b.doc_representative||'-')}</span></div>
    <div class="row"><span class="lbl">동일인 여부</span><span class="val">${b.match?'⚠️ 동일인 (대표자 본인 채용 — 확인 필요)':'✅ 다른 사람'}</span></div>
    <div class="row"><span class="lbl">판단 근거</span><span class="val">${esc(b.detail||'-')}</span></div>
  </div>`;
}

function renderEduCheck(e){
  const badge=e.result==='정상'?'badge-ok':'badge-warn';
  return `<div class="section">
    <h3>📋 학력확인서 검증 <span class="badge ${badge}">${esc(e.result)}</span></h3>
    <div style="padding:12px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);margin-bottom:10px">
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">학력 체크표</div>
      <div class="row"><span class="lbl">고등학교</span><span class="val">${esc(e.highschool_checked||'-')}</span></div>
      <div class="row"><span class="lbl">대학(원)교</span><span class="val">${esc(e.university_checked||'-')}</span></div>
      <div class="row"><span class="lbl">휴학/재학중 해당</span><span class="val">${e.has_problem?'⚠️ 해당 — 확인 필요':'✅ 해당 없음'}</span></div>
    </div>
    <div style="padding:12px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);margin-bottom:10px">
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">5번 질문 (재학중 여부)</div>
      <div class="row"><span class="lbl">체크 항목</span><span class="val">${e.yes_no_problem?'⚠️':'✅'} ${esc(e.yes_no_checked||'-')}</span></div>
      <div class="row"><span class="lbl">확인 필요</span><span class="val">${e.yes_no_problem?'⚠️ 예 (재학중으로 확인)':'정상'}</span></div>
    </div>
    <div class="row"><span class="lbl">종합 판단</span><span class="val" style="font-weight:700">${e.result==='정상'?'✅':'⚠️'} ${esc(e.detail||'-')}</span></div>
  </div>`;
}

function renderConsentCheck(c){
  const badge=c.result==='정상'?'badge-ok':'badge-warn';
  return `<div class="section">
    <h3>✍️ 사업참여 동의서 검증 <span class="badge ${badge}">${esc(c.result)}</span></h3>
    <ul class="checklist">
      <li><span class="ci">${c.checkboxes_ok?'✅':'❌'}</span><span><strong>동의 체크박스</strong><br><span style="font-size:11px;color:var(--gray)">${esc(c.checkboxes_detail||'-')}</span></span></li>
      <li><span class="ci">${c.date_filled?'✅':'❌'}</span><span><strong>날짜 기입</strong><br><span style="font-size:11px;color:var(--gray)">${esc(c.date_detail||'-')}</span></span></li>
      <li><span class="ci">${c.signature_ok?'✅':'❌'}</span><span><strong>서명/날인</strong><br><span style="font-size:11px;color:var(--gray)">${esc(c.signature_detail||'-')}</span></span></li>
    </ul>
    <div class="row" style="margin-top:12px"><span class="lbl">종합 판단</span><span class="val" style="font-weight:700">${c.result==='정상'?'✅':'⚠️'} ${esc(c.detail||'-')}</span></div>
  </div>`;
}

function renderSummary(r,nameOk){
  const banner=$('summaryBanner');
  let issues=0;
  const docs=r.documents||{};

  // Missing docs
  ['fact_certificate','graduation_certificate','employment_contract','business_registration','education_confirmation','participation_consent'].forEach(k=>{
    if(!docs[k]?.found)issues++;
  });

  // Name mismatch
  if(r.worker_name&&!nameOk)issues++;

  // Contract issues
  const ca=r.contract_analysis;
  if(ca){
    const et=ca.employment_type;
    if(et&&et.result!=='정규직')issues++;
    if(ca.minimum_wage?.result==='위반')issues++;
    if(ca.minimum_wage?.result==='확인불가')issues++;
    if(ca.required_items){
      const keys=['wage_components','working_hours','holidays','annual_leave','workplace_duties'];
      if(ca.required_items.is_part_time)keys.push('daily_schedule');
      keys.forEach(k=>{if(!ca.required_items[k]?.found)issues++});
    }
  }

  // Biz reg: match=true면 대표자=대상자 동일인 → 확인 필요
  if(r.business_reg_check&&r.business_reg_check.match)issues++;

  // Edu
  if(r.edu_check&&r.edu_check.result!=='정상')issues++;

  // Consent
  if(r.consent_check&&r.consent_check.result!=='정상')issues++;

  banner.style.display='block';
  if(issues===0){
    banner.className='summary-banner ok';
    banner.textContent='✅ 전체 검토 결과: 이상없음 — 청년일자리도약장려금 적격';
  }else{
    banner.className='summary-banner warn';
    banner.textContent=`⚠️ 전체 검토 결과: 검토필요 항목 ${issues}개`;
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function num(n){return n!=null?Number(n).toLocaleString('ko-KR'):'-'}
