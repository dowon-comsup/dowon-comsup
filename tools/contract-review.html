<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>근로계약서 자동 검토 | 노무법인 도원</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root{--primary:#059669;--primary-light:#d1fae5;--primary-dark:#047857;--danger:#dc2626;--warn:#d97706;--gray:#6b7280;--border:#e5e7eb;--bg:#f9fafb;--card-shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;max-width:1200px;margin:0 auto;padding:0 16px 60px;color:#222;background:#fff}
a{color:var(--primary);text-decoration:none}

/* Top bar */
.topbar{padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.topbar a{font-size:13px;font-weight:600;color:#2563eb}

h1{font-size:20px;border-bottom:2px solid #333;padding-bottom:8px;margin-bottom:4px}
.subtitle{font-size:12px;color:var(--gray);margin-bottom:20px}

/* API Key */
.api-section{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.api-section label{font-size:13px;font-weight:600;white-space:nowrap}
.api-section input{flex:1;min-width:280px;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:monospace}
.api-section input:focus{border-color:var(--primary);outline:none}
.api-section .status{font-size:11px;color:var(--gray)}

/* Upload area */
.upload-zone{border:2px dashed #94a3b8;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);margin-bottom:16px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone h3{font-size:15px;color:#334155;margin-bottom:6px}
.upload-zone p{font-size:12px;color:var(--gray)}
.upload-zone input{display:none}

/* File list */
.file-list{list-style:none;margin-bottom:16px}
.file-list li{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:4px 0;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:13px}
.file-list li .fname{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-list li .fsize{color:var(--gray);font-size:11px}
.file-list li .remove{background:var(--danger);color:#fff;border:none;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer}

/* Buttons */
.btn-row{text-align:center;margin:16px 0}
button{font-size:13px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff;font-size:15px;padding:12px 32px}
.btn-primary:hover:not(:disabled){background:var(--primary-dark)}

/* Progress */
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;margin:12px 0;overflow:hidden;display:none}
.progress-bar .fill{height:100%;background:var(--primary);transition:width .3s;width:0}
#statusText{font-size:12px;color:var(--gray);text-align:center;min-height:18px}

/* Summary banner */
.summary-banner{padding:16px 20px;border-radius:10px;margin:20px 0;font-size:15px;font-weight:700;display:none}
.summary-banner.ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.summary-banner.warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.summary-banner.error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}

/* Info bar */
.info-bar{display:flex;gap:16px;flex-wrap:wrap;padding:14px 18px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;margin-bottom:20px;display:none}
.info-bar .info-item{font-size:13px}
.info-bar .info-item .label{color:var(--gray);font-size:11px}
.info-bar .info-item .value{font-weight:700;color:#0c4a6e}

/* Document check cards */
.doc-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:24px}
.doc-card{border:1px solid var(--border);border-radius:10px;padding:16px;background:#fff;box-shadow:var(--card-shadow);display:flex;align-items:flex-start;gap:12px}
.doc-card .icon{font-size:28px;flex-shrink:0;line-height:1}
.doc-card .content h4{font-size:13px;margin-bottom:4px}
.doc-card .content p{font-size:11px;color:var(--gray);line-height:1.4}
.doc-card.found{border-color:#6ee7b7;background:#f0fdf4}
.doc-card.missing{border-color:#fca5a5;background:#fef2f2}
.doc-card.na{border-color:#fcd34d;background:#fffbeb}

/* Analysis sections */
.analysis-section{border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;background:#fff;box-shadow:var(--card-shadow)}
.analysis-section h3{font-size:15px;color:var(--primary-dark);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.analysis-section h3 .badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-ok{background:#d1fae5;color:#065f46}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-fail{background:#fee2e2;color:#991b1b}
.badge-na{background:#e5e7eb;color:#374151}

.detail-row{display:flex;gap:8px;margin:6px 0;font-size:13px;align-items:baseline}
.detail-row .label{color:var(--gray);min-width:140px;flex-shrink:0;font-weight:600}
.detail-row .value{color:#111}

/* Checklist */
.checklist{list-style:none}
.checklist li{padding:6px 0;font-size:13px;border-bottom:1px dashed var(--border);display:flex;align-items:center;gap:8px}
.checklist li:last-child{border-bottom:none}
.checklist .check-icon{font-size:16px;flex-shrink:0}

/* Log */
details{margin:8px 0}
summary{font-size:13px;cursor:pointer;color:var(--gray)}
pre.log{background:#f4f4f4;padding:10px;font-size:11px;overflow:auto;max-height:300px;border-radius:6px;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>

<div class="topbar">
  <a href="../index.html">&larr; 대시보드로 돌아가기</a>
</div>

<h1>근로계약서 자동 검토 도구 <span style="font-size:13px;color:#888">v1.0</span></h1>
<p class="subtitle">PDF 서류를 업로드하면 Claude AI가 서류 존재 여부, 정규직 판단, 최저임금 준수, 필수 기재사항을 자동 검토합니다. 모든 분석은 Anthropic API를 통해 수행됩니다.</p>

<!-- API Key -->
<div class="api-section">
  <label>Anthropic API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." value="">
  <span class="status" id="apiKeyStatus"></span>
</div>

<!-- Upload zone -->
<div class="upload-zone" id="uploadZone">
  <h3>PDF 파일을 드래그하거나 클릭하여 업로드</h3>
  <p>사실증명서, 졸업증명서, 근로계약서 등 관련 서류 PDF를 모두 업로드해주세요 (복수 파일 가능)</p>
  <input type="file" id="fileInput" accept="application/pdf" multiple>
</div>
<ul class="file-list" id="fileList"></ul>

<div class="btn-row">
  <button class="btn-primary" id="btnAnalyze" disabled>분석 실행</button>
</div>

<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<div id="statusText"></div>

<!-- Results -->
<div id="results" style="display:none">
  <div class="summary-banner" id="summaryBanner"></div>
  <div class="info-bar" id="infoBar"></div>
  <h2 style="font-size:16px;margin:20px 0 12px">서류 존재 여부</h2>
  <div class="doc-cards" id="docCards"></div>
  <div id="contractAnalysis"></div>
</div>

<details style="margin-top:24px"><summary>API 응답 원문 (디버그)</summary><pre class="log" id="debugLog">분석 실행 후 표시됩니다.</pre></details>

<script>
// ========== State ==========
let uploadedFiles = []; // {file, name, size}
const $ = id => document.getElementById(id);

// ========== API Key persistence ==========
(function initKey(){
  const saved = localStorage.getItem('ANTHROPIC_API_KEY');
  if(saved) $('apiKey').value = saved;
  $('apiKey').addEventListener('input', ()=>{
    const k=$('apiKey').value.trim();
    localStorage.setItem('ANTHROPIC_API_KEY', k);
    $('apiKeyStatus').textContent = k ? 'Key 저장됨' : '';
    updateBtn();
  });
  if(saved) $('apiKeyStatus').textContent = 'Key 저장됨';
})();

// ========== File Upload ==========
const zone = $('uploadZone');
const fileInput = $('fileInput');

zone.addEventListener('click', ()=> fileInput.click());
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('dragover')});
zone.addEventListener('dragleave', ()=>zone.classList.remove('dragover'));
zone.addEventListener('drop', e=>{
  e.preventDefault(); zone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', ()=> addFiles(fileInput.files));

function addFiles(files){
  for(const f of files){
    if(f.type!=='application/pdf'){alert(f.name+' : PDF 파일만 업로드 가능합니다.');continue}
    if(uploadedFiles.some(u=>u.name===f.name&&u.size===f.size)) continue;
    uploadedFiles.push({file:f, name:f.name, size:f.size});
  }
  renderFileList();
  updateBtn();
}

function renderFileList(){
  const ul=$('fileList'); ul.innerHTML='';
  uploadedFiles.forEach((f,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="fname">${esc(f.name)}</span><span class="fsize">${(f.size/1024).toFixed(0)} KB</span><button class="remove" data-i="${i}">삭제</button>`;
    ul.appendChild(li);
  });
  ul.querySelectorAll('.remove').forEach(b=>b.addEventListener('click',e=>{
    uploadedFiles.splice(+e.target.dataset.i,1);renderFileList();updateBtn();
  }));
}

function updateBtn(){
  $('btnAnalyze').disabled = !(uploadedFiles.length>0 && $('apiKey').value.trim());
}
updateBtn();

// ========== PDF to base64 ==========
async function pdfToBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=> res(reader.result.split(',')[1]);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

// ========== Claude API Call ==========
async function callClaude(apiKey, contents){
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:8000,
      temperature:0,
      messages:[{role:'user',content:contents}]
    })
  });
  const j=await r.json();
  if(!r.ok) throw new Error(JSON.stringify(j).slice(0,500));
  return j.content[0].text;
}

// ========== Main Analysis ==========
$('btnAnalyze').addEventListener('click', runAnalysis);

async function runAnalysis(){
  const apiKey=$('apiKey').value.trim();
  if(!apiKey){alert('API Key를 입력하세요.');return}
  if(!uploadedFiles.length){alert('PDF 파일을 업로드하세요.');return}

  $('btnAnalyze').disabled=true;
  $('progressBar').style.display='block';
  $('results').style.display='none';
  setProgress(5,'PDF 파일 변환 중...');

  try{
    // Convert all PDFs to base64
    const pdfContents = [];
    for(let i=0;i<uploadedFiles.length;i++){
      setProgress(5+Math.round(20*i/uploadedFiles.length), `PDF 변환 중 (${i+1}/${uploadedFiles.length})...`);
      const b64 = await pdfToBase64(uploadedFiles[i].file);
      pdfContents.push({name:uploadedFiles[i].name, base64:b64});
    }

    setProgress(30,'Claude AI 분석 중... (1~2분 소요)');

    // Build message content
    const content = [];
    pdfContents.forEach(p=>{
      content.push({
        type:'document',
        source:{type:'base64',media_type:'application/pdf',data:p.base64}
      });
      content.push({type:'text',text:`[위 PDF 파일명: ${p.name}]`});
    });

    content.push({type:'text',text:buildPrompt()});

    const raw = await callClaude(apiKey, content);
    $('debugLog').textContent = raw;

    setProgress(90,'결과 파싱 중...');

    // Parse JSON from response
    let result;
    try{
      const jsonMatch = raw.match(/```json\s*([\s\S]*?)\s*```/) || raw.match(/(\{[\s\S]*\})/);
      result = JSON.parse(jsonMatch[1]);
    }catch(e){
      throw new Error('AI 응답 파싱 실패: '+e.message+'\n\n원문:\n'+raw.slice(0,500));
    }

    setProgress(100,'완료');
    renderResults(result);
    $('results').style.display='block';

  }catch(e){
    alert('분석 오류: '+e.message);
    console.error(e);
    $('debugLog').textContent = e.message;
  }finally{
    $('btnAnalyze').disabled=false;
    setTimeout(()=>{$('progressBar').style.display='none';$('statusText').textContent=''},2000);
  }
}

function setProgress(pct,msg){
  $('progressFill').style.width=pct+'%';
  $('statusText').textContent=msg||'';
}

// ========== Prompt ==========
function buildPrompt(){
  return `당신은 한국 노동법 전문가입니다. 업로드된 PDF 서류들을 분석하여 아래 항목을 JSON으로 반환하세요.

## 분석 항목

### 1. 기본 정보 추출
- worker_name: 근로자 이름
- start_date: 입사일 (YYYY-MM-DD)
- company_name: 사업장명
- birth_date: 생년월일 (YYYY-MM-DD, 확인 가능 시)
### 2. 서류 존재 여부 (documents)
각 서류가 업로드된 PDF에 포함되어 있는지 판단:

- fact_certificate: 사실증명서
  - 판단기준: 국세청 발급, "사실증명" 또는 "사실 증명" 제목, 세무서장 직인 존재
  - found: true/false
  - detail: 판단 근거 설명

- graduation_certificate: 졸업증명서
  - 판단기준: 학교명, 졸업일자, 학위명 포함
  - found: true/false
  - detail: 판단 근거 (학교명, 학위 등)

- employment_contract: 근로계약서
  - 판단기준: "근로계약서" 제목 포함
  - found: true/false
  - detail: 판단 근거

### 3. 근로계약서 상세 분석 (contract_analysis) - 근로계약서가 있을 때만
근로계약서가 없으면 contract_analysis: null

#### 3-1. employment_type (정규직 여부)
판단기준:
- 계약기간 항목에 종료일(~년 ~월 ~일)이 명시 → "기간제"
- "기간의 정함이 없음", "정년까지" 등 → "정규직"
- 계약기간 항목 없음 → "정규직_추정" (주의)
- "자동종료", "갱신", "만료" 문구 → "기간제_가능성"
- 제목이 "기간제 근로계약서" → "기간제"

출력:
- result: "정규직"/"기간제"/"정규직_추정"/"기간제_가능성"/"판단불가"
- evidence: 근거가 된 원문 문구
- contract_period: 계약기간 (있다면)

#### 3-2. minimum_wage (최저임금 준수)
2025년 최저임금: 시급 10,030원 / 월환산(209시간) 2,096,270원

추출항목:
- monthly_salary: 계약서 기재 월급여 (숫자)
- hourly_wage: 계약서 기재 시급 (숫자, 있다면)
- weekly_hours: 소정근로시간 (주 몇 시간, 기본 40)
- monthly_hours: 월 환산 소정근로시간 (209시간이 기본, 주 40시간 외라면 재계산)

판단:
- 시급 직접 기재 시: 시급 >= 10,030원 여부
- 월급여만 있으면: 월급여 / 월환산시간 >= 10,030원
- result: "준수"/"위반"/"확인불가"
- calculated_hourly: 계산된 시급
- evidence: 계산 근거

#### 3-3. required_items (필수 기재사항)
근로기준법 제17조 기준:
- wage_components: 임금의 구성항목, 계산방법, 지급방법
- working_hours: 소정근로시간
- holidays: 휴일
- annual_leave: 연차 유급휴가
- workplace_duties: 취업 장소 및 종사 업무

단시간 근로자 추가 (주 15시간 미만일 때만 체크):
- daily_schedule: 근로일 및 근로일별 근로시간

각 항목:
- found: true/false
- detail: 해당 내용 요약 또는 미기재 사유

- is_part_time: 단시간 근로자 여부 (true/false)

## 응답 형식
반드시 아래 JSON 구조로만 응답하세요. 다른 텍스트 없이 JSON만 출력하세요:

\`\`\`json
{
  "worker_name": "",
  "start_date": "",
  "company_name": "",
  "birth_date": "",
  "documents": {
    "fact_certificate": {"found": false, "detail": ""},
    "graduation_certificate": {"found": false, "detail": ""},
    "employment_contract": {"found": false, "detail": ""}
  },
  "contract_analysis": null | {
    "employment_type": {
      "result": "",
      "evidence": "",
      "contract_period": ""
    },
    "minimum_wage": {
      "monthly_salary": 0,
      "hourly_wage": null,
      "weekly_hours": 40,
      "monthly_hours": 209,
      "result": "",
      "calculated_hourly": 0,
      "evidence": ""
    },
    "required_items": {
      "is_part_time": false,
      "wage_components": {"found": false, "detail": ""},
      "working_hours": {"found": false, "detail": ""},
      "holidays": {"found": false, "detail": ""},
      "annual_leave": {"found": false, "detail": ""},
      "workplace_duties": {"found": false, "detail": ""},
      "daily_schedule": {"found": false, "detail": ""}
    }
  }
}
\`\`\``;
}

// ========== Render Results ==========
function renderResults(r){
  // Info bar
  const infoBar=$('infoBar');
  infoBar.style.display='flex';
  infoBar.innerHTML='';
  const infos=[
    ['근로자','worker_name'],['입사일','start_date'],['사업장','company_name'],['생년월일','birth_date']
  ];
  infos.forEach(([label,key])=>{
    if(r[key]){
      infoBar.innerHTML+=`<div class="info-item"><div class="label">${label}</div><div class="value">${esc(r[key])}</div></div>`;
    }
  });

  // Document cards
  renderDocCards(r.documents, r);

  // Contract analysis
  const ca=$('contractAnalysis');
  ca.innerHTML='';
  if(r.contract_analysis){
    ca.innerHTML+=renderEmploymentType(r.contract_analysis.employment_type);
    ca.innerHTML+=renderMinimumWage(r.contract_analysis.minimum_wage);
    ca.innerHTML+=renderRequiredItems(r.contract_analysis.required_items);
  }

  // Summary banner
  renderSummary(r);
}

function renderDocCards(docs, r){
  const container=$('docCards'); container.innerHTML='';
  const items=[
    {key:'fact_certificate',label:'사실증명서',desc:'국세청 발급 사실증명',icon:'📄'},
    {key:'graduation_certificate',label:'졸업증명서',desc:'학교명/졸업일/학위',icon:'🎓'},
    {key:'employment_contract',label:'근로계약서',desc:'근로계약서 원본',icon:'📝'}
  ];

  items.forEach(item=>{
    const d=docs[item.key];
    let cls,statusText;

    cls=d.found?'found':'missing';
    statusText=d.found?'있음':'없음';

    const statusIcon=cls==='found'?'✅':cls==='missing'?'❌':'⚠️';
    container.innerHTML+=`<div class="doc-card ${cls}">
      <div class="icon">${item.icon}</div>
      <div class="content">
        <h4>${statusIcon} ${item.label} — ${statusText}</h4>
        <p>${esc(d.detail||'')}</p>
      </div>
    </div>`;
  });
}

function renderEmploymentType(et){
  if(!et) return '';
  const badge=et.result==='정규직'?'badge-ok':
    et.result==='기간제'?'badge-warn':
    et.result.includes('추정')?'badge-warn':'badge-na';
  const resultLabel={
    '정규직':'정규직','기간제':'기간제(계약직)',
    '정규직_추정':'정규직 추정 (주의)','기간제_가능성':'기간제 가능성',
    '판단불가':'판단불가'
  }[et.result]||et.result;

  return `<div class="analysis-section">
    <h3>📋 정규직 여부 판단 <span class="badge ${badge}">${esc(resultLabel)}</span></h3>
    <div class="detail-row"><span class="label">판정 결과</span><span class="value">${esc(resultLabel)}</span></div>
    ${et.contract_period?`<div class="detail-row"><span class="label">계약기간</span><span class="value">${esc(et.contract_period)}</span></div>`:''}
    <div class="detail-row"><span class="label">근거 문구</span><span class="value">${esc(et.evidence||'-')}</span></div>
  </div>`;
}

function renderMinimumWage(mw){
  if(!mw) return '';
  const badge=mw.result==='준수'?'badge-ok':mw.result==='위반'?'badge-fail':'badge-na';

  return `<div class="analysis-section">
    <h3>💰 최저임금 준수 여부 <span class="badge ${badge}">${esc(mw.result)}</span></h3>
    ${mw.monthly_salary?`<div class="detail-row"><span class="label">월급여 (계약서)</span><span class="value">${num(mw.monthly_salary)}원</span></div>`:''}
    ${mw.hourly_wage?`<div class="detail-row"><span class="label">시급 (계약서)</span><span class="value">${num(mw.hourly_wage)}원</span></div>`:''}
    <div class="detail-row"><span class="label">주 소정근로시간</span><span class="value">${mw.weekly_hours||'-'}시간</span></div>
    <div class="detail-row"><span class="label">월 환산시간</span><span class="value">${mw.monthly_hours||'-'}시간</span></div>
    <div class="detail-row"><span class="label">환산 시급</span><span class="value">${mw.calculated_hourly?num(Math.round(mw.calculated_hourly))+'원':'-'}</span></div>
    <div class="detail-row"><span class="label">2025 최저시급</span><span class="value">10,030원 (월 2,096,270원 / 209h)</span></div>
    <div class="detail-row"><span class="label">계산 근거</span><span class="value">${esc(mw.evidence||'-')}</span></div>
  </div>`;
}

function renderRequiredItems(ri){
  if(!ri) return '';
  const items=[
    {key:'wage_components',label:'임금 구성항목·계산방법·지급방법'},
    {key:'working_hours',label:'소정근로시간'},
    {key:'holidays',label:'휴일'},
    {key:'annual_leave',label:'연차 유급휴가'},
    {key:'workplace_duties',label:'취업 장소 및 종사 업무'}
  ];

  if(ri.is_part_time){
    items.push({key:'daily_schedule',label:'근로일 및 근로일별 근로시간 (단시간 근로자)'});
  }

  const total=items.length;
  const found=items.filter(i=>ri[i.key]?.found).length;
  const badge=found===total?'badge-ok':found>=total-1?'badge-warn':'badge-fail';

  let html=`<div class="analysis-section">
    <h3>📑 필수 기재사항 체크 (근로기준법 §17) <span class="badge ${badge}">${found}/${total} 기재</span></h3>`;

  if(ri.is_part_time){
    html+=`<div style="margin-bottom:10px;font-size:12px;color:var(--warn);font-weight:600">⚠️ 단시간 근로자로 판단됨 — 추가 필수항목 포함</div>`;
  }

  html+=`<ul class="checklist">`;
  items.forEach(item=>{
    const d=ri[item.key];
    const ok=d?.found;
    html+=`<li>
      <span class="check-icon">${ok?'✅':'❌'}</span>
      <span><strong>${item.label}</strong><br><span style="font-size:11px;color:var(--gray)">${esc(d?.detail||'-')}</span></span>
    </li>`;
  });
  html+=`</ul></div>`;
  return html;
}

function renderSummary(r){
  const banner=$('summaryBanner');
  let issues=0;
  const docs=r.documents;

  // Check missing docs
  if(!docs.fact_certificate.found) issues++;
  if(!docs.graduation_certificate.found) issues++;
  if(!docs.employment_contract.found) issues++;

  // Check contract issues
  const ca=r.contract_analysis;
  if(ca){
    if(ca.employment_type?.result==='기간제'||ca.employment_type?.result==='기간제_가능성'||ca.employment_type?.result==='판단불가') issues++;
    if(ca.minimum_wage?.result==='위반') issues++;
    if(ca.minimum_wage?.result==='확인불가') issues++;
    if(ca.required_items){
      const keys=['wage_components','working_hours','holidays','annual_leave','workplace_duties'];
      if(ca.required_items.is_part_time) keys.push('daily_schedule');
      keys.forEach(k=>{if(!ca.required_items[k]?.found) issues++});
    }
  }

  banner.style.display='block';
  if(issues===0){
    banner.className='summary-banner ok';
    banner.textContent='✅ 전체 검토 결과: 이상없음';
  }else{
    banner.className='summary-banner warn';
    banner.textContent=`⚠️ 전체 검토 결과: 검토필요 항목 ${issues}개`;
  }
}

// ========== Helpers ==========
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function num(n){return n!=null?Number(n).toLocaleString('ko-KR'):'-'}
</script>
