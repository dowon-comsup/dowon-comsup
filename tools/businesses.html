<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업장 조회 | 노무법인 도원</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263347;
    --border: #334155;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --green: #10b981;
    --blue: #3b82f6;
    --purple: #818cf8;
    --orange: #f59e0b;
    --red: #ef4444;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px; min-height: 100vh; }

  /* 헤더 */
  .header { background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px;
    position: sticky; top: 0; z-index: 100; }
  .header-back { color: var(--text2); text-decoration: none; font-size: 13px;
    display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
  .header-back:hover { color: var(--text); }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .header-count { font-size: 12px; color: var(--text3); background: var(--surface2);
    padding: 3px 10px; border-radius: 20px; }
  .header-refresh { margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    transition: all 0.2s; }
  .header-refresh:hover { background: var(--border); color: var(--text); }

  /* 검색 & 필터 */
  .toolbar { padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 14px; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px 9px 36px; color: var(--text); font-size: 14px;
    outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2);
    border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 12px 16px; text-align: left; font-size: 12px; color: var(--text3);
    font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    white-space: nowrap; position: sticky; top: 56px; z-index: 10; }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.selected { background: rgba(99,102,241,0.1); border-left: 3px solid var(--accent); }
  td { padding: 12px 16px; vertical-align: middle; white-space: nowrap; }
  td.name { font-weight: 600; color: var(--text); max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.sub { color: var(--text2); font-size: 13px; }
  td.amount { font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums; }
  td.amount.green { color: var(--green); }
  td.amount.gray { color: var(--text3); }

  /* 뱃지 */
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    font-weight: 600; white-space: nowrap; }
  .badge-green { background: rgba(16,185,129,0.15); color: var(--green); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-gray { background: rgba(100,116,139,0.15); color: var(--text3); }
  .badge-orange { background: rgba(245,158,11,0.15); color: var(--orange); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }

  /* 로딩 */
  .loading { display: flex; align-items: center; justify-content: center;
    padding: 80px 0; gap: 12px; color: var(--text2); }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 상세 패널 */
  .panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; }
  .panel-overlay.open { display: block; }
  .panel { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; max-width: 100vw;
    background: var(--surface); border-left: 1px solid var(--border); z-index: 201;
    transform: translateX(100%); transition: transform 0.3s ease; overflow-y: auto; }
  .panel.open { transform: translateX(0); }
  .panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .panel-title { font-size: 16px; font-weight: 700; }
  .panel-close { background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 20px; padding: 4px; transition: color 0.2s; }
  .panel-close:hover { color: var(--text); }
  .panel-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
  .panel-section { }
  .panel-section-title { font-size: 11px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 600; margin-bottom: 10px; }
  .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .panel-field { }
  .panel-field-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .panel-field-val { font-size: 14px; color: var(--text); }
  .panel-field-val.green { color: var(--green); font-weight: 700; }
  .panel-field-val.blue { color: var(--blue); }
  .divider { height: 1px; background: var(--border); }

  /* 0원 안내 버튼 */
  .mail-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .mail-btn:hover { background: #4f46e5; transform: translateY(-1px); }
  .mail-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed;
    transform: none; }
  .mail-btn-sub { font-size: 12px; color: var(--text3); text-align: center; margin-top: 6px; }

  /* 빈 상태 */
  .empty { padding: 60px 0; text-align: center; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* 상단 요약 */
  .summary-bar { padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 24px; flex-wrap: wrap; }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: 11px; color: var(--text3); }
  .summary-val { font-size: 16px; font-weight: 700; }
  .summary-val.green { color: var(--green); }
  .summary-val.blue { color: var(--blue); }

  /* 반응형 */
  @media (max-width: 768px) {
    .panel { width: 100vw; }
    .toolbar { padding: 12px 16px; }
    thead th, td { padding: 10px 12px; font-size: 12px; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <a href="https://dowon-comsup.github.io/dowon-comsup/index.html" class="header-back">← 대시보드</a>
  <span class="header-title">사업장 조회</span>
  <span class="header-count" id="headerCount">로딩 중...</span>
  <button class="header-refresh" id="refreshBtn">↺ 새로고침</button>
</div>

<!-- 요약 바 -->
<div class="summary-bar" id="summaryBar" style="display:none">
  <div class="summary-item">
    <span class="summary-label">전체 사업장</span>
    <span class="summary-val" id="sumTotal">-</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">즉시신청 가능</span>
    <span class="summary-val green" id="sumImmediate">-</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">검토 완료</span>
    <span class="summary-val blue" id="sumDone">-</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">이메일 미등록</span>
    <span class="summary-val" id="sumNoEmail">-</span>
  </div>
</div>

<!-- 툴바 -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search-input" id="searchInput" placeholder="사업장명, 담당자, 사업자번호 검색..." />
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="immediate">즉시금액 있음</button>
    <button class="filter-btn" data-filter="done">검토 완료</button>
    <button class="filter-btn" data-filter="undone">검토 미완료</button>
    <button class="filter-btn" data-filter="zero">0원 사업장</button>
  </div>
</div>

<!-- 테이블 -->
<div class="table-wrap" id="tableWrap">
  <div class="loading"><div class="spinner"></div>사업장 목록 불러오는 중...</div>
</div>

<!-- 상세 패널 오버레이 -->
<div class="panel-overlay" id="panelOverlay"></div>
<div class="panel" id="detailPanel">
  <div class="panel-header">
    <span class="panel-title" id="panelTitle">-</span>
    <button class="panel-close" id="panelClose">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
const MAIL_BODY_TEMPLATE = (bizName, contactPerson, dowonManager) => `안녕하세요, ${contactPerson} 담당자님.
노무법인 도원 ${dowonManager}입니다. 먼저, 저희 도원에 계인 업무를 위임해 주셔서 감사드립니다.

한 시점 기준으로 귀사의 신청가능한 고용지원금을 검토한 결과, 현재 즉시 신청 가능한 금액은 없는 것으로 확인되었습니다.

아울러, 4대보험 환급의 경우 고용지원금과는 별도의 기준 및 검토 절차에 따라 진행되는 항목으로 현재 순차적으로 검토중이며 환급 가능 금액이 확인되는 경우 별도로 안내드릴 예정입니다.

당사업에서 향후에도 주기적인 모니터링을 통해 고용지원금 및 4대보험 환급금 발생 여부를 지속적으로 체크할 예정이며, 신청 요건 충족 시 전화 또는 메일로 적극 안내해 드리겠습니다.

주요 고용지원금 지원 요건을 아래와 같이 안내드리오니 업무에 참고해 주시기 바랍니다.
※ 해당 사항 발생 시 사전에 공유해 주시면 보다 적시에 검토가 가능합니다.

[주요 고용지원금 지원 요건]

1. 모성보호 제도(육아휴직 등) 관련
- 육아휴직/육아기 근로시간 단축: 근로자에게 30일 이상 허용 시 (월 30만 원 지원)
- 대체인력 채용: 출산전후휴가 및 육아휴직자의 대체인력을 신규 채용 시 (월 130만 원 지원)

2. 청년 신규고용 관련
- 우선권 우선 기업: 취업의 어려움을 겪는 청년을 정규직 채용 후 6개월 이상 고용 유지 시 (1인당 1년간 최대 720만 원)
- 비우선권 우선 기업: 청년을 정규직 채용 후 6개월 이상 고용 유지 시 (사업주 지원 성격 / 근로자 대신 2년간 최대 480만 원 지원 별도)

3. 기타 참고사항
- 퇴직연금제도: 퇴직연금 가입 후 매월 납입시에 산재보험료 경감이 가능합니다.
  ※ 퇴직연금 신규 도입 시 관련 내용 확인 바랍니다.
- 대표자 및 친족 관련: 대표자(법인의 경우 대표이사) 및 대표자의 친족이 4대보험에 가입된 경우, 부정수급의 위험이 있습니다.
  ※ 해당 사항이 있으시면 꼭 당사로 확인 바랍니다.

위 안내드린 내용 이외에도 관련하여 궁금하신 사항이 있으시면 언제든지 메일 또는 02-2038-8671로 연락 부탁드립니다.

감사합니다.
${dowonManager} 드림`;

// —— API ——
const API = {
  async fetchBusinesses(filter = 'all', search = '') {
    const cacheKey = `dowon_biz_${filter}_${search}`;
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < 5 * 60 * 1000) return data;
    }
    const params = new URLSearchParams();
    if (filter && filter !== 'all') params.set('filter', filter);
    if (search) params.set('search', search);
    const url = 'https://n8n-docker.dowonbiz.com/webhook/businesses' + (params.toString() ? '?' + params.toString() : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const json = await res.json();
    const data = Array.isArray(json) ? json
              : Array.isArray(json?.data) ? json.data
              : json && typeof json === 'object' ? [json]
              : [];
    sessionStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data }));
    return data;
  },
  clearCache() {
    Object.keys(sessionStorage).filter(k => k.startsWith('dowon_biz_')).forEach(k => sessionStorage.removeItem(k));
  },
  async logZeroMail(pageId) {
    fetch('https://n8n-docker.dowonbiz.com/webhook/log-zero-mail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_id: pageId }),
    }).catch(() => {});
  },
};

// —— 상태 ——
let filtered = [];
let currentFilter = 'all';
let currentSearch = '';
let selectedRow = null;
let searchTimer = null;

// —— 금액 포맷 ——
const fmt = (v) => {
  const n = Number(v);
  if (!v || isNaN(n) || n === 0) return null;
  return n >= 10000 ? (n / 10000).toFixed(0) + '만원' : n.toLocaleString() + '원';
};

// —— 데이터 로드 ——
async function loadData() {
  const wrap = document.getElementById('tableWrap');
  const countEl = document.getElementById('headerCount');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  countEl.textContent = '...';
  document.getElementById('summaryBar').style.display = 'none';

  try {
    const data = await API.fetchBusinesses(currentFilter, currentSearch);
    filtered = data;
    document.getElementById('headerCount').textContent = `${data.length}개`;
    document.getElementById('summaryBar').style.display = 'flex';
    document.getElementById('sumTotal').textContent = data.length;
    document.getElementById('sumImmediate').textContent = data.filter(b => Number(b.subsidy_immediate) > 0).length;
    document.getElementById('sumDone').textContent = data.filter(b => b.review_complete === true).length;
    document.getElementById('sumNoEmail').textContent = data.filter(b => !b.contact_email).length;
    renderTable();
  } catch(e) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">&#9888;</div>데이터 로드 실패<br><span style="font-size:12px;color:#64748b">${e.message}</span></div>`;
    countEl.textContent = '오류';
  }
}

// —— 테이블 렌더 ——
function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">&#128270;</div>검색 결과가 없습니다.</div>`;
    return;
  }
  const rows = filtered.map((biz, i) => {
    const immAmt = fmt(biz.subsidy_immediate);
    const futAmt = fmt(biz.subsidy_future);
    const isDone = biz.review_complete === true || biz.review_complete === 'true';
    const statusBadge = isDone
      ? '<span class="badge badge-green">완료</span>'
      : '<span class="badge badge-gray">미완료</span>';
    const lastReview = biz.last_review_date ? biz.last_review_date.slice(0,10) : '-';
    return `
      <tr data-idx="${i}">
        <td class="name">${biz.name}</td>
        <td class="sub hide-mobile">${biz.contact_person || '-'}</td>
        <td class="sub hide-mobile">${biz.dowon_subsidy_manager || '-'}</td>
        <td class="amount ${immAmt ? 'green' : 'gray'}">${immAmt || '-'}</td>
        <td class="amount ${futAmt ? '' : 'gray'} hide-mobile">${futAmt || '-'}</td>
        <td class="sub hide-mobile">${lastReview}</td>
        <td>${statusBadge}</td>
      </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>사업장명</th>
          <th class="hide-mobile">담당자</th>
          <th class="hide-mobile">도원담당</th>
          <th>즉시금액</th>
          <th class="hide-mobile">향후금액</th>
          <th class="hide-mobile">최종검토일</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="tbody">${rows}</tbody>
    </table>`;

  document.getElementById('tbody').addEventListener('click', (e) => {
    const tr = e.target.closest('tr');
    if (!tr) return;
    const idx = parseInt(tr.dataset.idx);
    openPanel(filtered[idx], tr);
  });
}

// —— 상세 패널 ——
function openPanel(biz, tr) {
  if (selectedRow) selectedRow.classList.remove('selected');
  selectedRow = tr;
  tr.classList.add('selected');

  document.getElementById('panelTitle').textContent = biz.name;

  const hasEmail = !!biz.contact_email;
  const dowonMgr = biz.dowon_subsidy_manager || '담당자';
  const contactPerson = biz.contact_person || '담당자';
  const subject = encodeURIComponent(`[노무법인 도원] ${biz.name} 고용지원금 검토 결과 조부의 건`);
  const body = encodeURIComponent(MAIL_BODY_TEMPLATE(biz.name, contactPerson, dowonMgr));
  const mailtoHref = `mailto:${biz.contact_email || ''}?subject=${subject}&body=${body}`;

  document.getElementById('panelBody').innerHTML = `
    <!-- 0원 안내 메일 -->
    <div class="panel-section">
      <button class="mail-btn" id="mailBtn" ${!hasEmail ? 'disabled' : ''}
        onclick="openMail('${biz.id}', '${mailtoHref.replace(/'/g,"\\'")}')">
        &#9993; 0원 안내 메일 열기
      </button>
      <div class="mail-btn-sub">
        ${hasEmail
          ? `수신: ${biz.contact_email} · 클릭 시 Gmail이 열립니다`
          : '이메일 미등록 — 노션에서 담당자 이메일을 입력해주세요'}
      </div>
    </div>
    <div class="divider"></div>

    <!-- 기본 정보 -->
    <div class="panel-section">
      <div class="panel-section-title">기본 정보</div>
      <div class="panel-grid">
        <div class="panel-field"><div class="panel-field-label">사업자번호</div><div class="panel-field-val">${biz.biz_reg_no || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">관리번호</div><div class="panel-field-val">${biz.mgmt_no || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">담당자</div><div class="panel-field-val">${biz.contact_person || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">연락처</div><div class="panel-field-val">${biz.contact_phone || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">이메일</div><div class="panel-field-val">${biz.contact_email || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">기업규모</div><div class="panel-field-val">${biz.corp_size || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">근로자 수</div><div class="panel-field-val">${biz.worker_count ? biz.worker_count + '명' : '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">주소</div><div class="panel-field-val">${biz.address || '-'}</div></div>
      </div>
    </div>
    <div class="divider"></div>

    <!-- 검토 금액 -->
    <div class="panel-section">
      <div class="panel-section-title">검토 금액</div>
      <div class="panel-grid">
        <div class="panel-field"><div class="panel-field-label">즉시신청 가능</div><div class="panel-field-val green">${fmt(biz.subsidy_immediate) || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">향후 가능</div><div class="panel-field-val">${fmt(biz.subsidy_future) || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">지원금 합계</div><div class="panel-field-val">${fmt(biz.subsidy_total) || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">4대보험 환급</div><div class="panel-field-val">${fmt(biz.refund_total) || '-'}</div></div>
      </div>
    </div>
    <div class="divider"></div>

    <!-- 도원 담당 -->
    <div class="panel-section">
      <div class="panel-section-title">도원 담당</div>
      <div class="panel-grid">
        <div class="panel-field"><div class="panel-field-label">지원금 담당자</div><div class="panel-field-val blue">${biz.dowon_subsidy_manager || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">환급 담당자</div><div class="panel-field-val blue">${biz.dowon_refund_manager || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">약정 요율</div><div class="panel-field-val">${biz.contract_rate || '-'}</div></div>
        <div class="panel-field"><div class="panel-field-label">최종검토일</div><div class="panel-field-val">${biz.last_review_date ? biz.last_review_date.slice(0,10) : '-'}</div></div>
      </div>
    </div>

    <!-- 노션 링크 -->
    <div class="panel-section">
      <a href="${biz.notion_url}" target="_blank" style="display:block; text-align:center;
        color: var(--text3); font-size: 12px; text-decoration: none; padding: 8px;">
        노션에서 열기 →
      </a>
    </div>
  `;

  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function openMail(pageId, href) {
  window.open(href, '_blank');
  API.logZeroMail(pageId);
  const btn = document.getElementById('mailBtn');
  if (btn) {
    btn.textContent = '메일 열림 (노션 기록 완료)';
    btn.style.background = '#059669';
    setTimeout(() => {
      btn.innerHTML = '&#9993; 0원 안내 메일 열기';
      btn.style.background = '';
    }, 3000);
  }
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  if (selectedRow) { selectedRow.classList.remove('selected'); selectedRow = null; }
}

// —— 초기화 ——
function init() {
  document.getElementById('tableWrap').innerHTML =
    `<div class="empty"><div class="empty-icon">&#128269;</div>필터를 선택하거나 검색어를 입력하세요</div>`;
  document.getElementById('headerCount').textContent = '-';
}

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  currentSearch = q;
  if (q.length === 0 && currentFilter === 'all') {
    filtered = [];
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty"><div class="empty-icon">&#128269;</div>필터를 선택하거나 검색어를 입력하세요</div>`;
    document.getElementById('headerCount').textContent = '-';
    document.getElementById('summaryBar').style.display = 'none';
    return;
  }
  if (q.length >= 2 || currentFilter !== 'all') {
    searchTimer = setTimeout(() => loadData(), 400);
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    loadData();
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  API.clearCache();
  if (currentFilter !== 'all' || currentSearch.length >= 2) {
    loadData();
  } else {
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty"><div class="empty-icon">&#128269;</div>필터를 선택하거나 검색어를 입력하세요</div>`;
    document.getElementById('headerCount').textContent = '-';
    document.getElementById('summaryBar').style.display = 'none';
  }
});

document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('panelOverlay').addEventListener('click', closePanel);

init();
</script>
</body>
</html>
